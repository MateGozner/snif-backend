# docker-compose.yml
version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=snif;Username=admin;Password=yourpassword
      - ASPNETCORE_URLS=http://+:8080
      - Redis__ConnectionString=redis:6379
    depends_on:
      - db
      - redis
    networks:
      - snif-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - snif-network
      
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: snif
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - snif-network

networks:
  snif-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: